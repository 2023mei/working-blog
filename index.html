<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Working Blog</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { 
            --primary-bg: #f8f9fa; 
            --sidebar-bg: #2c3e50; 
            --accent-blue: #5d8aa8; 
            --accent-grey: #7f8c8d; 
            --text-main: #34495e; 
            --border-color: #dcdde1; 
            --danger-red: #e74c3c;
        }

        body { font-family: -apple-system, sans-serif; display: flex; height: 100vh; margin: 0; background: var(--primary-bg); color: var(--text-main); }
        
        #sidebar { width: 240px; background: var(--sidebar-bg); color: #ecf0f1; padding: 25px 15px; overflow-y: auto; box-shadow: 2px 0 5px rgba(0,0,0,0.1); }
        #sidebar h3 { font-size: 13px; color: var(--accent-grey); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px; }

        #main { flex: 1; display: flex; flex-direction: column; padding: 30px 40px; position: relative; }
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        h2 { font-weight: 400; font-size: 24px; margin: 0; color: #2c3e50; }

        .controls { margin-bottom: 20px; display: flex; gap: 10px; align-items: center; }
        input { flex: 1; padding: 12px; border: 1px solid var(--border-color); border-radius: 6px; outline: none; font-size: 14px; transition: 0.3s; }
        input:focus { border-color: var(--accent-blue); }

        button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 6px; font-size: 13px; transition: 0.2s; color: white; font-weight: 500; }
        .btn-new { background: transparent; border: 1px solid var(--accent-blue); color: var(--accent-blue); }
        .btn-new:hover { background: var(--accent-blue); color: white; }
        .btn-save { background: var(--accent-blue); }
        .btn-save:hover { background: #4a6d84; }
        .btn-export { background: var(--accent-grey); }
        
        #deleteBtn { background: transparent; color: var(--danger-red); font-size: 12px; border: none; cursor: pointer; align-self: flex-end; margin-top: 10px; display: none; }
        #deleteBtn:hover { text-decoration: underline; }

        .editor-container { display: flex; flex: 1; gap: 25px; min-height: 0; }
        textarea, #preview { flex: 1; padding: 25px; border: 1px solid var(--border-color); border-radius: 8px; background: white; overflow-y: auto; line-height: 1.8; font-size: 15px; }
        textarea { border: 1px solid #e0e0e0; outline: none; resize: none; color: #2c3e50; }
        #preview { box-shadow: 0 4px 15px rgba(0,0,0,0.05); }

        .log-item { padding: 12px 15px; border-radius: 8px; margin-bottom: 10px; cursor: pointer; background: rgba(255,255,255,0.03); transition: 0.2s; }
        .log-item:hover { background: rgba(255,255,255,0.08); }
        .log-title { font-size: 14px; color: #ecf0f1; display: block; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .log-time { font-size: 11px; color: var(--accent-grey); display: block; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h3>Archive</h3>
        <div id="logList"></div>
    </div>

    <div id="main">
        <div class="header-row">
            <h2>Working Blog</h2>
            <button class="btn-new" onclick="newLog()">+ 新建日志</button>
        </div>
        <div class="controls">
            <input type="text" id="title" placeholder="输入标题...">
            <button class="btn-save" onclick="saveLog()">保存</button>
            <button class="btn-export" onclick="exportJSON()">备份</button>
        </div>
        <div class="editor-container">
            <textarea id="editor" placeholder="在此处开始记录..." oninput="updatePreview()"></textarea>
            <div id="preview"></div>
        </div>
        <button id="deleteBtn" onclick="deleteLog()">删除此条日志</button>
    </div>

    <script>
        const STORAGE_KEY = 'my_final_working_blog_v1';
        let logs = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');

        function updatePreview() {
            const content = document.getElementById('editor').value;
            document.getElementById('preview').innerHTML = marked.parse(content);
        }

        function formatDate(ms) {
            const d = new Date(ms);
            return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
        }

        function newLog() {
            document.getElementById('title').value = '';
            document.getElementById('editor').value = '';
            document.getElementById('preview').innerHTML = '';
            document.getElementById('deleteBtn').style.display = 'none';
        }

        function saveLog() {
            const t = document.getElementById('title').value.trim();
            const c = document.getElementById('editor').value;
            if (!t) return alert("标题不能为空");
            const now = Date.now();
            logs[t] = { content: c, createdAt: logs[t] ? logs[t].createdAt : now, updatedAt: now };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(logs));
            render();
            document.getElementById('deleteBtn').style.display = 'block';
        }

        function deleteLog() {
            const t = document.getElementById('title').value.trim();
            if (t && logs[t]) {
                if (confirm(`确定要永久删除《${t}》吗？`)) {
                    delete logs[t];
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(logs));
                    newLog();
                    render();
                }
            }
        }

        function render() {
            const list = document.getElementById('logList');
            list.innerHTML = '';
            const sortedKeys = Object.keys(logs).sort((a, b) => logs[b].updatedAt - logs[a].updatedAt);
            sortedKeys.forEach(t => {
                const item = logs[t];
                const div = document.createElement('div');
                div.className = 'log-item';
                div.innerHTML = `<span class="log-title">${t}</span><span class="log-time">修: ${formatDate(item.updatedAt)}</span>`;
                div.onclick = () => {
                    document.getElementById('title').value = t;
                    document.getElementById('editor').value = item.content;
                    updatePreview();
                    document.getElementById('deleteBtn').style.display = 'block';
                };
                list.appendChild(div);
            });
        }

        function exportJSON() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(logs));
            const a = document.createElement('a');
            a.setAttribute("href", dataStr); a.setAttribute("download", `backup.json`); a.click();
        }
        render();
    </script>
</body>
</html>
